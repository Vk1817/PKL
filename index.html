<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Stream</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #242424, #3b5998);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .player-container {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            display: none; /* Hidden by default */
        }
        .player-container iframe {
            border-radius: 15px;
            width: 100%;
            height: 100%;
        }
        .telegram-promo {
            margin-top: 30px;
        }
        .promo-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #008fd6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            margin: 0 15px;
            transition: background 0.2s;
        }
        .promo-btn:hover {
            background-color: #006bb3;
        }
    </style>
</head>
<body>

    <h2>To Watch the Stream, Please Join Our Telegram Channel</h2>
    
    <div class="telegram-promo" id="telegramPromo">
        <button class="promo-btn" onclick="window.open('https://t.me/+yTkSuf20ZUtjMGVl', '_blank')">Join Now</button>
        <button class="promo-btn" onclick="showStream()">Already Joined</button>
    </div>

    <div class="player-container" id="playerContainer">
        <div style="padding:56.25% 0 0 0;position:relative;">
            <iframe id="contentFrame" sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation" 
                frameborder="0" gesture="media" allow="encrypted-media" allowfullscreen="true" scrolling="no" 
                src="https://star-sports-hindi-1-hd.vercel.app/" style="position:absolute;top:0;left:0;width:100%;height:100%;"></iframe>
        </div>
    </div>

    <script>
        function showStream() {
            document.getElementById('telegramPromo').style.display = 'none';
            document.getElementById('playerContainer').style.display = 'block';
        }
    </script>
</body>
</html>
